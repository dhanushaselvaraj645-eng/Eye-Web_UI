<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eye Diseases — Netra Vision Eye Hospital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-header"></div>

<main>
  <section class="page-banner">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">Home</a> / Eye Diseases</div>
      <h1>Eye Diseases We Treat</h1>
      <p style="max-width:580px;margin:0 auto;">Understanding the symptoms and causes of common eye conditions is the first step toward protecting your vision.</p>
    </div>
  </section>

  <section class="section">
    <div class="container grid grid-3" id="diseaseGrid"></div>
  </section>

  <section class="section-tight">
    <div class="container">
      <div class="cta-banner" data-aos="zoom">
        <div><h2>Noticing any of these symptoms?</h2><p>Early diagnosis makes a real difference. Book a screening today.</p></div>
        <div class="cta-actions"><a href="appointment.html" class="btn btn-accent">Book Appointment</a><a href="emergency.html" class="btn" style="background:rgba(255,255,255,.15);color:#fff;">Emergency Care</a></div>
      </div>
    </div>
  </section>
</main>

<div id="app-footer"></div>
<div id="app-floating"></div>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
const diseases = [
  {name:'Cataract', img:'https://www.poudrevalleyeyecare.com/wp-content/uploads/2025/08/ChatGPT-Image-Aug-4-2025-03_28_49-PM-1.jpg', symptoms:'Cloudy or blurred vision, faded colors, glare from lights.', causes:'Aging, diabetes, prolonged UV exposure, eye injury.', treatment:'Phacoemulsification cataract surgery with lens implant.'},
  {name:'Glaucoma', img:'https://tse1.explicit.bing.net/th/id/OIP.vGbyYMEPztw4G_USJlkKkwHaE3?r=0&rs=1&pid=ImgDetMain&o=7&rm=3', symptoms:'Gradual peripheral vision loss, eye pain, halos around lights.', causes:'Elevated intraocular pressure, family history, age.', treatment:'Pressure-lowering drops, laser therapy or surgery.'},
  {name:'Diabetic Retinopathy', img:'https://tse2.mm.bing.net/th/id/OIP.lfCQMrIm5A5FH3p6DyWV_AAAAA?r=0&w=380&h=260&rs=1&pid=ImgDetMain&o=7&rm=3', symptoms:'Blurred vision, dark spots, difficulty seeing at night.', causes:'Long-term high blood sugar damaging retinal vessels.', treatment:'Laser photocoagulation, anti-VEGF injections, blood sugar control.'},
  {name:'Conjunctivitis', img:'https://as2.ftcdn.net/v2/jpg/04/07/87/87/1000_F_407878796_vEh1EmmEEUeFjs69Jnen8XPmvcndgqqS.jpg', symptoms:'Redness, itching, watery or sticky discharge.', causes:'Viral or bacterial infection, allergies, irritants.', treatment:'Antibiotic or antihistamine drops, cool compresses, hygiene care.'},
  {name:'Dry Eyes', img:'https://tse1.explicit.bing.net/th/id/OIP.xR6Wc1lTKdVs2LL1SqAy-QHaEK?r=0&rs=1&pid=ImgDetMain&o=7&rm=3', symptoms:'Burning, grittiness, redness, fluctuating vision.', causes:'Reduced tear production, screen time, aging, medications.', treatment:'Lubricating drops, punctal plugs, lifestyle adjustments.'},
  {name:'Myopia (Near-sightedness)', img:'https://images.unsplash.com/photo-1518152006812-edab29b069ac?auto=format&fit=crop&w=600&q=70', symptoms:'Distant objects appear blurry, squinting, headaches.', causes:'Elongated eyeball, genetics, excessive near work.', treatment:'Glasses, contact lenses, LASIK surgery.'},
  {name:'Hyperopia (Far-sightedness)', img:'https://tse2.mm.bing.net/th/id/OIP.CrbzHJ0oRec4eODDqtSyzAHaFj?r=0&w=732&h=549&rs=1&pid=ImgDetMain&o=7&rm=3', symptoms:'Near objects appear blurry, eye strain, headaches.', causes:'Shorter eyeball shape, genetics.', treatment:'Corrective glasses, contact lenses, refractive surgery.'},
  {name:'Astigmatism', img:'https://tse3.mm.bing.net/th/id/OIP.qLZ5D96bgSF1vtSdZMNBkAHaE8?r=0&rs=1&pid=ImgDetMain&o=7&rm=3', symptoms:'Blurred or distorted vision at all distances, eye strain.', causes:'Irregularly shaped cornea or lens.', treatment:'Toric glasses/contact lenses, LASIK surgery.'},
  {name:'Retina Problems', img:'https://tse1.explicit.bing.net/th/id/OIP.54rqq8tQ31ysF5Gw3SCUwgHaE8?r=0&rs=1&pid=ImgDetMain&o=7&rm=3', symptoms:'Sudden flashes, floaters, curtain-like vision loss.', causes:'Retinal detachment, macular degeneration, trauma.', treatment:'Laser therapy, vitrectomy, retinal reattachment surgery.'},
];
document.getElementById('diseaseGrid').innerHTML = diseases.map(d=>`
  <div class="disease-card" data-aos="up">
    <div class="disease-thumb"><img src="${d.img}" alt="${d.name}"></div>
    <div class="disease-body">
      <h3>${d.name}</h3>
      <div class="dl"><b>Symptoms</b><span>${d.symptoms}</span></div>
      <div class="dl"><b>Causes</b><span>${d.causes}</span></div>
      <div class="dl"><b>Treatment</b><span>${d.treatment}</span></div>
      <a href="treatments.html" class="card-link">Read More
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" width="14" height="14"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
  </div>`).join('');
</script>
</body>
</html>
