<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog & Eye Care Tips — Netra Vision Eye Hospital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-header"></div>

<main>
  <section class="page-banner">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">Home</a> / Blog</div>
      <h1>Blog &amp; Eye Care Tips</h1>
      <p style="max-width:560px;margin:0 auto;">Practical, doctor-reviewed advice to help you protect your vision every day.</p>
    </div>
  </section>

  <section class="section">
    <div class="container grid grid-3" id="blogGrid"></div>
  </section>

  <section class="section-tight">
    <div class="container">
      <div class="cta-banner" data-aos="zoom">
        <div><h2>Get eye care tips in your inbox</h2><p>Subscribe to our newsletter for monthly vision-care updates.</p></div>
        <div class="cta-actions">
          <form style="display:flex;gap:0;border-radius:100px;overflow:hidden;background:rgba(255,255,255,.15);padding:5px;" onsubmit="event.preventDefault(); this.reset(); alert('Thanks for subscribing!');">
            <input type="email" required placeholder="Your email" style="border:none;background:transparent;padding:10px 16px;color:#fff;outline:none;">
            <button type="submit" class="btn btn-accent btn-sm">Subscribe</button>
          </form>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="app-footer"></div>
<div id="app-floating"></div>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
const blogs = [
  {img:'https://images.unsplash.com/photo-1579684385127-1ef15d508118?auto=format&fit=crop&w=600&q=80', cat:'Eye Care', date:'Jul 15, 2026', title:'10 Simple Tips to Protect Your Eyes Every Day', desc:'Small daily habits — from the 20-20-20 rule to proper lighting — that make a big difference for long-term eye health.'},
  {img:'https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=600&q=80', cat:'Digital Eye Strain', date:'Jul 8, 2026', title:'Understanding Computer Vision Syndrome', desc:'Why long screen hours cause dryness and headaches, and how to set up your workspace to reduce eye strain.'},
  {img:'https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=600&q=80', cat:'Nutrition', date:'Jun 29, 2026', title:'Best Foods for Healthy, Sharp Eyesight', desc:'Leafy greens, citrus fruits and omega-3 rich foods that support the retina and reduce age-related eye disease risk.'},
  {img:'https://tse1.mm.bing.net/th/id/OIP.yp9uAhtbbrtw69feAHTlNwHaE7?r=0&rs=1&pid=ImgDetMain&o=7&rm=3', cat:'Pediatric', date:'Jun 18, 2026', title:"Children's Eye Care: What Every Parent Should Know", desc:'Warning signs of vision problems in kids, and why annual eye screening matters even before school age.'},
  {img:'https://th.bing.com/th/id/OIP.HibiaudGLAa5LAvu8kfG1QHaE8?r=0&o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3', cat:'Cataract', date:'Jun 5, 2026', title:'Early Cataract Symptoms You Shouldn\u2019t Ignore', desc:'How to recognise early cataract signs like glare sensitivity and faded colours, and when to see a specialist.'},
  {img:'https://tse1.mm.bing.net/th/id/OIP.5L9XoEX_J56WJim1ak4kXgHaD5?r=0&rs=1&pid=ImgDetMain&o=7&rm=3', cat:'Glaucoma', date:'May 27, 2026', title:'Why Regular Eye Pressure Checks Matter', desc:'Glaucoma often has no early symptoms — here\u2019s why a routine pressure check can save your vision.'},
];
document.getElementById('blogGrid').innerHTML = blogs.map(b=>`
  <div class="blog-card" data-aos="up">
    <div class="blog-thumb"><img src="${b.img}" alt="${b.title}"></div>
    <div class="blog-body">
      <div class="blog-meta"><span>${b.cat}</span><span>${b.date}</span></div>
      <h3>${b.title}</h3><p style="font-size:.9rem;margin-bottom:14px;">${b.desc}</p>
      <a href="#" class="card-link">Read Article
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" width="14" height="14"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
  </div>`).join('');
</script>
</body>
</html>
